<!DOCTYPE html>
<html>
<head>
    <title>Nike Store - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #111111 30%, #3a0008 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.9);
        }

        .page-title {
            color: white;
            font-weight: 700;
        }

        .hero {
            background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(217,4,41,0.85));
            color: white;
            border-radius: 20px;
            padding: 32px;
            margin-top: 24px;
            margin-bottom: 28px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.25);
        }

        .product-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.16);
            background: white;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 28px rgba(0,0,0,0.22);
        }

        .product-image {
            height: 180px;
            width: 100%;
            object-fit: cover;
            background: #eee;
        }

        .price {
            color: #d90429;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .rating {
            color: #f4a300;
            font-weight: 600;
        }

        .stock {
            color: green;
            font-size: 0.95rem;
        }

        .add-btn {
            background: #111;
            border: none;
            border-radius: 10px;
        }

        .add-btn:hover {
            background: #d90429;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">NIKE STORE</span>
    <div>
        <a href="/cart" class="btn btn-outline-light me-2" id="go-cart">Cart</a>
        <a href="/orders" class="btn btn-outline-light me-2" id="go-orders">Orders</a>
        <a href="/dashboard" class="btn btn-outline-light" id="go-dashboard">Dashboard</a>
        <a href="/reset" class="btn btn-warning">Reset</a>
    </div>
</nav>

<div class="container">

    <div class="hero">
        <h2 class="mb-2">Welcome, {{ customer.name }}</h2>
        <p class="mb-0">Explore the latest Nike shoes, apparel, and accessories.</p>
    </div>

    <div class="row">
        {% for product in products %}
        <div class="col-md-3 mb-4">
            <div class="card product-card">

                <a href="/product/{{ product.id }}" style="text-decoration: none; color: inherit;">
                    <img src="{{ product.image }}" alt="{{ product.name }}" class="product-image">
                    <div class="p-3">
                        <h5>{{ product.name }}</h5>
                        <p class="text-muted mb-2">{{ product.category }}</p>
                        <div class="price mb-1">₹{{ product.price }}</div>
                        <div class="rating mb-1">⭐ {{ product.rating }}</div>
                        <div class="stock">{{ product.stock }}</div>
                    </div>
                </a>

                <div class="px-3 pb-3">
                    <form method="post" action="/add-to-cart/{{ product.id }}">
                        <button
                            type="submit"
                            class="btn add-btn text-white w-100"
                            id="add-to-cart-{{ product.id }}"
                        >
                            Add to Cart
                        </button>
                    </form>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
