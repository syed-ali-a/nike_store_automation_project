<!DOCTYPE html>
<html>
<head>
    <title>Nike Store - Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #111111 30%, #3a0008 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.92);
        }

        .details-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.18);
            overflow: hidden;
            background: rgba(255, 255, 255, 0.97);
            margin-top: 30px;
        }

        .product-image {
            width: 100%;
            height: 360px;
            object-fit: cover;
            background: #eee;
            border-radius: 16px;
        }

        .price {
            color: #d90429;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .rating {
            color: #f4a300;
            font-weight: 600;
        }

        .stock {
            color: green;
            font-weight: 600;
        }

        .add-btn {
            background: #111;
            border: none;
            border-radius: 10px;
            padding: 12px;
        }

        .add-btn:hover {
            background: #d90429;
        }

        .label-title {
            font-weight: 700;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">NIKE STORE</span>
    <div>
        <a href="/products" class="btn btn-outline-light me-2" id="back-products">Products</a>
        <a href="/cart" class="btn btn-outline-light me-2" id="go-cart">Cart</a>
        <a href="/orders" class="btn btn-outline-light me-2" id="go-orders">Orders</a>
        <a href="/dashboard" class="btn btn-outline-light" id="go-dashboard">Dashboard</a>
    </div>
</nav>

<div class="container">

    <div class="card details-card p-4">
        <div class="row align-items-center">

            <div class="col-md-5 mb-4 mb-md-0">
                <img src="{{ product.image }}" alt="{{ product.name }}" class="product-image" id="product-image">
            </div>

            <div class="col-md-7">
                <h2 id="product-name">{{ product.name }}</h2>
                <p class="text-muted" id="product-category">{{ product.category }}</p>

                <div class="price mb-2" id="product-price">₹{{ product.price }}</div>
                <div class="rating mb-2" id="product-rating">⭐ {{ product.rating }}</div>
                <div class="stock mb-4" id="product-stock">{{ product.stock }}</div>

                <form method="post" action="/add-to-cart/{{ product.id }}">

                    <div class="mb-3">
                        <label for="selected-size" class="label-title mb-2">Select Size</label>
                        <select name="selected_size" id="selected-size" class="form-select">
                            {% for size in product.sizes %}
                            <option value="{{ size }}">{{ size }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="selected-color" class="label-title mb-2">Select Color</label>
                        <select name="selected_color" id="selected-color" class="form-select">
                            {% for color in product.colors %}
                            <option 
                                value="{{ color }}"
                                {% if color == product.default_color %}selected{% endif %}
                            >
                                {{ color }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <div class="label-title mb-2">Material</div>
                        <div id="product-material">{{ product.material }}</div>
                    </div>

                    <button
                        type="submit"
                        class="btn add-btn text-white w-100"
                        id="add-to-cart-details"
                    >
                        Add to Cart
                    </button>

                </form>
            </div>

        </div>
    </div>

</div>

<script>
    const imagesByColor = {{ product.images_by_color | default({}) | tojson }};
    const colorSelect = document.getElementById("selected-color");
    const productImage = document.getElementById("product-image");

    function updateProductImage() {
        const selectedColor = colorSelect.value;
        if (imagesByColor[selectedColor]) {
            productImage.src = imagesByColor[selectedColor];
        }
    }

    colorSelect.addEventListener("change", updateProductImage);
</script>

</body>
</html>
