<!DOCTYPE html>
<html>
<head>
    <title>Nike Store Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background:
                linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
                url("/static/images/nike-login-bg.webp") no-repeat center center fixed;
            background-size: cover;
        }

        .login-wrapper {
            min-height: 100vh;
        }

        .login-card {
            width: 390px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .brand-title {
            font-weight: 800;
            letter-spacing: 2px;
        }

        .login-btn {
            background: #111;
            border: none;
            border-radius: 10px;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            background: #d90429;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .demo-text {
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container login-wrapper d-flex justify-content-center align-items-center">
    <div class="card login-card p-4 p-md-5">
        <h2 class="text-center mb-2 brand-title">NIKE STORE</h2>
        <p class="text-center text-muted mb-4">Customer Login</p>

        {% if error %}
        <div class="alert alert-danger text-center" id="login-error">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >
            </div>

            <button
                type="submit"
                class="btn login-btn w-100 text-white py-2"
                id="login-button"
            >
                Login
            </button>
        </form>

        <div class="mt-4 text-center text-muted demo-text">
            Demo: <strong>nikeuser / 1234</strong>
        </div>
    </div>
</div>

</body>
</html>
